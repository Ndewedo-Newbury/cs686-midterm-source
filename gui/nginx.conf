# HTTP — redirect everything to HTTPS except the certbot renewal challenge
server {
    listen 80;
    server_name qa.cs686.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name qa.cs686.live;

    ssl_certificate     /etc/letsencrypt/live/qa.cs686.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.cs686.live/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
