services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NODE_ENV: ${NODE_ENV}

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
